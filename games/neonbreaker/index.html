<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON_BREAKER | Circuit Destructor</title>
    <style>
        :root {
            --bg: #050505;
            --neon-blue: #00d2ff;
            --neon-pink: #f40076;
            --neon-green: #00ff66;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg);
            font-family: var(--font-mono);
            color: #fff;
        }

        #ui-layer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .stats-box {
            display: flex;
            gap: 40px;
        }

        .stat {
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        .value {
            font-size: 20px;
            font-weight: bold;
            color: var(--neon-blue);
        }

        canvas {
            display: block;
            background: #000;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .title {
            font-size: 4vw;
            font-weight: 700;
            color: var(--neon-pink);
            letter-spacing: -2px;
            margin-bottom: 20px;
        }

        .btn {
            background: none;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 10px 30px;
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            pointer-events: all;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .hidden { display: none !important; }

        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 210, 255, 0.1);
            top: 0;
            animation: scan 6s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div class="stats-box">
            <div class="stat">
                <span class="label">POWER_LEVEL</span>
                <span id="score" class="value">0000</span>
            </div>
            <div class="stat">
                <span class="label">LIVES</span>
                <span id="lives" class="value">03</span>
            </div>
        </div>
        <div class="label" style="text-align: right;">NEON_BREAKER // v1.0</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="overlay">
        <div class="title">NEON_BREAKER</div>
        <div style="font-size: 12px; opacity: 0.5; margin-bottom: 30px;">[ USE MOUSE OR TOUCH TO MOVE PADDLE ]</div>
        <button class="btn" onclick="init()">START_REACTION</button>
    </div>

    <div class="scanline"></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const livesEl = document.getElementById('lives');
        const overlay = document.getElementById('overlay');

        let paddle = { w: 100, h: 15, x: 0 };
        let ball = { x: 0, y: 0, dx: 4, dy: -4, r: 8 };
        let bricks = [];
        let score = 0;
        let lives = 3;
        let active = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            reset();
        }

        function reset() {
            paddle.x = (canvas.width - paddle.w) / 2;
            ball.x = canvas.width / 2;
            ball.y = canvas.height - 50;
            ball.dx = 4 * (Math.random() > 0.5 ? 1 : -1);
            ball.dy = -4;
            
            const rows = 5;
            const cols = 8;
            const padding = 10;
            const offsetTop = 100;
            const brickW = (canvas.width - (cols + 1) * padding) / cols;
            const brickH = 30;

            bricks = [];
            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    bricks.push({
                        x: c * (brickW + padding) + padding,
                        y: r * (brickH + padding) + offsetTop,
                        w: brickW,
                        h: brickH,
                        status: 1,
                        color: r === 0 ? '#f40076' : r === 1 ? '#00d2ff' : '#00ff66'
                    });
                }
            }
        }

        function init() {
            active = true;
            overlay.classList.add('hidden');
            score = 0;
            lives = 3;
            updateUI();
            reset();
            loop();
        }

        function updateUI() {
            scoreEl.innerText = score.toString().padStart(4, '0');
            livesEl.innerText = lives.toString().padStart(2, '0');
        }

        window.addEventListener('mousemove', e => {
            paddle.x = e.clientX - paddle.w / 2;
        });

        window.addEventListener('touchmove', e => {
            paddle.x = e.touches[0].clientX - paddle.w / 2;
            e.preventDefault();
        }, { passive: false });

        function loop() {
            if(!active) return;

            ctx.fillStyle = 'rgba(5, 5, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Wall collisions
            if(ball.x + ball.r > canvas.width || ball.x - ball.r < 0) ball.dx *= -1;
            if(ball.y - ball.r < 0) ball.dy *= -1;
            
            // Paddle collision
            if(ball.y + ball.r > canvas.height - 30) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                    ball.dy *= -1.05; // Speed up slightly
                    // Add X variance based on hit location
                    let hitOffset = (ball.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
                    ball.dx += hitOffset * 2;
                } else if(ball.y + ball.r > canvas.height) {
                    lives--;
                    updateUI();
                    if(lives <= 0) {
                        active = false;
                        overlay.classList.remove('hidden');
                        document.querySelector('.title').innerText = "SYSTEM_FAILURE";
                        return;
                    }
                    ball.x = canvas.width / 2;
                    ball.y = canvas.height - 50;
                    ball.dx = 4;
                    ball.dy = -4;
                }
            }

            // Bricks
            let remaining = 0;
            bricks.forEach(b => {
                if(b.status === 1) {
                    remaining++;
                    if(ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                        ball.dy *= -1;
                        b.status = 0;
                        score += 50;
                        updateUI();
                    }
                    ctx.fillStyle = b.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = b.color;
                    ctx.fillRect(b.x, b.y, b.w, b.h);
                }
            });

            if(remaining === 0) {
                active = false;
                overlay.classList.remove('hidden');
                document.querySelector('.title').innerText = "CIRCUIT_CLEARED";
                return;
            }

            // Paddle
            ctx.fillStyle = varColor('--neon-blue');
            ctx.shadowBlur = 15;
            ctx.shadowColor = varColor('--neon-blue');
            ctx.fillRect(paddle.x, canvas.height - 30, paddle.w, paddle.h);

            // Ball
            ctx.fillStyle = '#fff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fill();

            ctx.shadowBlur = 0;
            requestAnimationFrame(loop);
        }

        function varColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }

        window.addEventListener('resize', resize);
        resize();
    </script>
</body>
</html>
