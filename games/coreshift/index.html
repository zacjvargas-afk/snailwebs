<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORESHIFT | Binary Survival</title>
    <style>
        :root {
            --bg-color: #050505;
            --accent-color: #00ff66;
            --danger-color: #ff3366;
            --grid-color: #1a1a1a;
            --text-color: #e1e1e6;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
        }

        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-mono);
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #000;
            display: block;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.1);
        }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 100;
        }

        .hud-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 2px;
        }

        .hud-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        #terminal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(8px);
        }

        .status-header {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: -2px;
            text-transform: uppercase;
        }

        .accent { color: var(--accent-color); }
        .danger { color: var(--danger-color); }

        .btn {
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 30px;
            font-family: var(--font-mono);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.4);
        }

        .scanline {
            width: 100%;
            height: 100px;
            z-index: 300;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(255, 255, 255, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .hidden { display: none !important; }

        #level-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div class="hud-label">CORES_HARVESTED</div>
            <div id="score" class="hud-value">0000</div>
            <div class="hud-label">S_INTEGRITY</div>
            <div id="integrity" class="hud-value">100%</div>
        </div>

        <div id="level-indicator">
            <div class="hud-label">THREAT_LEVEL</div>
            <div id="level" class="hud-value">01</div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="terminal-overlay">
            <div id="overlay-content">
                <div class="status-header accent">CORE_SHIFT</div>
                <div style="font-size: 12px; margin-bottom: 30px; color: #888; text-align: center;">USE ARROW KEYS OR WASD TO NAVIGATE</div>
                <button class="btn" onclick="startGame()">INITIALIZE_BOOT</button>
            </div>
        </div>

        <div class="scanline"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const integrityElement = document.getElementById('integrity');
        const overlay = document.getElementById('terminal-overlay');
        const overlayContent = document.getElementById('overlay-content');

        let width, height;
        let player = { x: 0, y: 0, size: 20, speed: 5 };
        let obstacles = [];
        let particles = [];
        let score = 0;
        let level = 1;
        let integrity = 100;
        let gameActive = false;
        let frameCount = 0;
        let keys = {};

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            player.x = width / 2;
            player.y = height - 100;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function resetGame() {
            score = 0;
            level = 1;
            integrity = 100;
            obstacles = [];
            particles = [];
            player.x = width / 2;
            player.y = height - 100;
            updateHUD();
        }

        function startGame() {
            resetGame();
            gameActive = true;
            overlay.classList.add('hidden');
            animate();
        }

        function gameOver() {
            gameActive = false;
            overlay.classList.remove('hidden');
            overlayContent.innerHTML = `
                <div class="status-header danger">VAULT_FATAL_ERR</div>
                <div style="font-size: 32px; color: #fff; margin-bottom: 5px;">${score}</div>
                <div class="hud-label">TOTAL_CORES_RECOVERED</div>
                <button class="btn" onclick="startGame()">REBOOT_SYSTEM</button>
            `;
        }

        function updateHUD() {
            scoreElement.innerText = score.toString().padStart(4, '0');
            levelElement.innerText = level.toString().padStart(2, '0');
            integrityElement.innerText = integrity + '%';
        }

        function createParticle(x, y, color) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    size: Math.random() * 3 + 1,
                    life: 1.0,
                    color
                });
            }
        }

        function animate() {
            if (!gameActive) return;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);

            // Draw grid
            ctx.strokeStyle = 'rgba(0, 255, 102, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 40;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Player movement
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // Bounds
            player.x = Math.max(player.size, Math.min(width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(height - player.size, player.y));

            // Spawn obstacles
            frameCount++;
            const spawnRate = Math.max(5, 30 - level * 2);
            if (frameCount % spawnRate === 0) {
                obstacles.push({
                    x: Math.random() * width,
                    y: -50,
                    width: Math.random() * 40 + 20,
                    height: Math.random() * 40 + 20,
                    speed: Math.random() * 3 + 2 + (level * 0.5)
                });
            }

            // Draw player
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ff66';
            ctx.fillStyle = '#00ff66';
            ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
            ctx.shadowBlur = 0;

            // Draw obstacles
            obstacles.forEach((obs, index) => {
                obs.y += obs.speed;
                
                ctx.strokeStyle = '#ff3366';
                ctx.lineWidth = 2;
                ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
                ctx.fillStyle = 'rgba(255, 51, 102, 0.2)';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                // Collision
                if (
                    player.x + player.size/2 > obs.x &&
                    player.x - player.size/2 < obs.x + obs.width &&
                    player.y + player.size/2 > obs.y &&
                    player.y - player.size/2 < obs.y + obs.height
                ) {
                    integrity -= 5;
                    createParticle(player.x, player.y, '#ff3366');
                    obstacles.splice(index, 1);
                    updateHUD();
                    if (integrity <= 0) gameOver();
                }

                // Remove out of bounds
                if (obs.y > height) {
                    obstacles.splice(index, 1);
                    score += 10;
                    if (score % 200 === 0) {
                        level++;
                        integrity = Math.min(100, integrity + 10);
                    }
                    updateHUD();
                }
            });

            // Particles
            particles.forEach((p, index) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) {
                    particles.splice(index, 1);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    ctx.globalAlpha = 1;
                }
            });

            requestAnimationFrame(animate);
        }

        resize();
    </script>
</body>
</html>
